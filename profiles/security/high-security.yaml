profile:
  name: "High Security Baseline"
  description: "Comprehensive security hardening profile for MikroTik routers"
  variables: []

  firewall:
    rules:
      - "allow established/related connections"
      - "drop invalid connections"
      - "allow ICMP"

  commands:
    # Disable unused services
    - "/ip service disable telnet"
    - "/ip service disable ftp"
    - "/ip service disable www"
    - "/ip service set winbox port=8292"  # Change default port
    - "/ip service set api port=8729"     # Change default port

    # SSH hardening
    - "/ip service set ssh port=2222"     # Change SSH port

    # MAC server security
    - "/tool mac-server set allowed-interface-list=LAN"
    - "/tool mac-server mac-winbox set allowed-interface-list=LAN"

    # Neighbor discovery security
    - "/ip neighbor discovery-settings set discover-interface-list=LAN"

    # Bandwidth server (disable)
    - "/tool bandwidth-server set enabled=no"

    # DNS cache poisoning protection
    - "/ip dns set allow-remote-requests=no"

    # Firewall: Block common attacks
    - "/ip firewall filter add chain=input action=drop protocol=tcp dst-port=23 comment=\"Block Telnet\""
    - "/ip firewall filter add chain=input action=drop protocol=tcp dst-port=21 comment=\"Block FTP\""

    # Rate limit SSH attempts
    - "/ip firewall filter add chain=input action=accept protocol=tcp dst-port=2222 connection-state=established,related"
    - "/ip firewall filter add chain=input action=drop protocol=tcp dst-port=2222 src-address-list=ssh_blacklist"
    - "/ip firewall filter add chain=input action=add-src-to-address-list protocol=tcp dst-port=2222 connection-state=new src-address-list=ssh_stage3 address-list=ssh_blacklist address-list-timeout=1d"
    - "/ip firewall filter add chain=input action=add-src-to-address-list protocol=tcp dst-port=2222 connection-state=new src-address-list=ssh_stage2 address-list=ssh_stage3 address-list-timeout=1m"
    - "/ip firewall filter add chain=input action=add-src-to-address-list protocol=tcp dst-port=2222 connection-state=new src-address-list=ssh_stage1 address-list=ssh_stage2 address-list-timeout=1m"
    - "/ip firewall filter add chain=input action=add-src-to-address-list protocol=tcp dst-port=2222 connection-state=new address-list=ssh_stage1 address-list-timeout=1m"

    # Block port scanners
    - "/ip firewall filter add chain=input action=drop protocol=tcp psd=21,3s,3,1 comment=\"Port scan detection\""

    # Protect against SYN flood
    - "/ip firewall filter add chain=input action=accept protocol=tcp tcp-flags=syn connection-limit=30,32 comment=\"Allow SYN up to limit\""
    - "/ip firewall filter add chain=input action=drop protocol=tcp tcp-flags=syn comment=\"Drop SYN flood\""
